server {
  listen 80;
  server_name _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location /_next/static/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location / {
    rewrite ^/(.+)/$ /$1 break;
    try_files $uri.html $uri $uri/ =404;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
