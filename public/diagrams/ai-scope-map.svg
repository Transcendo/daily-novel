<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI scope map</title>
  <desc id="desc">A layered map that places artificial intelligence above machine learning, deep learning, generative AI, and agent systems.</desc>
  <rect width="1200" height="720" fill="#f6f7f5"/>
  <rect x="70" y="70" width="1060" height="580" fill="#ffffff" stroke="#11140f" stroke-opacity=".18" stroke-width="2"/>
  <circle cx="600" cy="360" r="260" fill="#315f4a" fill-opacity=".08" stroke="#315f4a" stroke-width="4"/>
  <circle cx="515" cy="390" r="185" fill="#2f9e44" fill-opacity=".12" stroke="#2f9e44" stroke-width="4"/>
  <circle cx="455" cy="415" r="112" fill="#f0c419" fill-opacity=".28" stroke="#d99200" stroke-width="4"/>
  <rect x="675" y="250" width="270" height="92" fill="#f7efe1" stroke="#be3a34" stroke-width="4"/>
  <rect x="700" y="405" width="250" height="92" fill="#e8f4ee" stroke="#315f4a" stroke-width="4"/>
  <text x="600" y="137" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="54" font-weight="700" fill="#11140f">AI</text>
  <text x="515" y="285" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="42" font-weight="700" fill="#11140f">Machine Learning</text>
  <text x="455" y="430" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="34" font-weight="700" fill="#11140f">Deep Learning</text>
  <text x="810" y="306" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="30" font-weight="700" fill="#11140f">Generative AI</text>
  <text x="825" y="462" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="30" font-weight="700" fill="#11140f">Agent Systems</text>
  <path d="M565 392 C650 330 695 320 675 305" fill="none" stroke="#11140f" stroke-opacity=".35" stroke-width="4"/>
  <path d="M548 468 C650 525 706 510 700 462" fill="none" stroke="#11140f" stroke-opacity=".35" stroke-width="4"/>
  <text x="600" y="618" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="22" fill="#596157">AI is the broad field. The other labels are approaches, model families, or system patterns inside it.</text>
</svg>
