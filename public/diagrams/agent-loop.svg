<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent loop</title>
  <desc id="desc">A loop showing how an AI agent plans, uses tools, observes results, and updates the next action.</desc>
  <rect width="1200" height="720" fill="#f6f7f5"/>
  <text x="600" y="88" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="42" font-weight="700" fill="#11140f">Agent = goal plus loop plus tools</text>
  <circle cx="600" cy="380" r="210" fill="#e8f4ee" stroke="#315f4a" stroke-width="4"/>
  <g font-family="Geist, Arial, sans-serif" font-size="26" font-weight="700" fill="#11140f">
    <rect x="500" y="170" width="200" height="82" fill="#ffffff" stroke="#11140f" stroke-opacity=".25" stroke-width="3"/>
    <text x="600" y="222" text-anchor="middle">Plan</text>
    <rect x="790" y="340" width="200" height="82" fill="#fff7d4" stroke="#d99200" stroke-width="4"/>
    <text x="890" y="392" text-anchor="middle">Act</text>
    <rect x="500" y="505" width="200" height="82" fill="#ffffff" stroke="#11140f" stroke-opacity=".25" stroke-width="3"/>
    <text x="600" y="557" text-anchor="middle">Observe</text>
    <rect x="210" y="340" width="200" height="82" fill="#f7efe1" stroke="#be3a34" stroke-width="4"/>
    <text x="310" y="392" text-anchor="middle">Update</text>
  </g>
  <path d="M670 242 C770 260 825 300 858 340" fill="none" stroke="#11140f" stroke-width="5" stroke-opacity=".35"/>
  <path d="M850 422 C815 500 760 540 700 546" fill="none" stroke="#11140f" stroke-width="5" stroke-opacity=".35"/>
  <path d="M500 546 C410 536 350 490 315 422" fill="none" stroke="#11140f" stroke-width="5" stroke-opacity=".35"/>
  <path d="M340 340 C380 275 455 235 530 242" fill="none" stroke="#11140f" stroke-width="5" stroke-opacity=".35"/>
  <text x="600" y="384" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="32" font-weight="700" fill="#11140f">Goal</text>
  <text x="600" y="424" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="20" fill="#596157">with permissions and human checks</text>
</svg>
