<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LLM token flow</title>
  <desc id="desc">A simplified flow showing text split into tokens, processed by a model, and generated as output tokens.</desc>
  <rect width="1200" height="720" fill="#f6f7f5"/>
  <text x="600" y="86" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="42" font-weight="700" fill="#11140f">How a language model handles text</text>
  <rect x="85" y="230" width="245" height="135" fill="#ffffff" stroke="#11140f" stroke-opacity=".25" stroke-width="3"/>
  <text x="207" y="292" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="28" font-weight="700" fill="#11140f">Input text</text>
  <text x="207" y="328" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="18" fill="#596157">question, context, examples</text>
  <rect x="425" y="210" width="350" height="175" fill="#e8f4ee" stroke="#315f4a" stroke-width="4"/>
  <text x="600" y="268" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="30" font-weight="700" fill="#11140f">Tokens + model weights</text>
  <text x="600" y="310" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="19" fill="#596157">attention compares context</text>
  <text x="600" y="344" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="19" fill="#596157">probabilities select next tokens</text>
  <rect x="870" y="230" width="245" height="135" fill="#fff7d4" stroke="#d99200" stroke-width="4"/>
  <text x="993" y="292" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="28" font-weight="700" fill="#11140f">Output</text>
  <text x="993" y="328" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="18" fill="#596157">generated token sequence</text>
  <path d="M330 298 H425" stroke="#11140f" stroke-width="5" stroke-opacity=".35"/>
  <path d="M775 298 H870" stroke="#11140f" stroke-width="5" stroke-opacity=".35"/>
  <g fill="#be3a34">
    <rect x="190" y="455" width="70" height="40"/><rect x="280" y="455" width="70" height="40"/><rect x="370" y="455" width="70" height="40"/>
    <rect x="460" y="455" width="70" height="40"/><rect x="550" y="455" width="70" height="40"/><rect x="640" y="455" width="70" height="40"/>
    <rect x="730" y="455" width="70" height="40"/><rect x="820" y="455" width="70" height="40"/><rect x="910" y="455" width="70" height="40"/>
  </g>
  <text x="600" y="540" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="22" fill="#596157">The model does not read words exactly like people do. It operates on tokenized pieces of text.</text>
</svg>
