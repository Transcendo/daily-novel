<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="540" rx="24" fill="#0F172A"/>
  <text x="480" y="72" text-anchor="middle" fill="#F8FAFC" font-size="34" font-family="Arial, sans-serif" font-weight="700">幻觉常出现在“看起来像答案”但“证据没跟上”的地方</text>
  <text x="480" y="110" text-anchor="middle" fill="#94A3B8" font-size="18" font-family="Arial, sans-serif">流畅、自信、格式完整，不等于真实、可查、可证</text>

  <rect x="86" y="186" width="220" height="170" rx="22" fill="#1D4ED8"/>
  <text x="196" y="242" text-anchor="middle" fill="#EFF6FF" font-size="28" font-family="Arial, sans-serif" font-weight="700">输入</text>
  <text x="196" y="282" text-anchor="middle" fill="#DBEAFE" font-size="18" font-family="Arial, sans-serif">问题含糊</text>
  <text x="196" y="316" text-anchor="middle" fill="#DBEAFE" font-size="18" font-family="Arial, sans-serif">上下文不够</text>
  <text x="196" y="350" text-anchor="middle" fill="#DBEAFE" font-size="18" font-family="Arial, sans-serif">检索材料缺失</text>

  <rect x="370" y="170" width="220" height="202" rx="22" fill="#7C3AED"/>
  <text x="480" y="232" text-anchor="middle" fill="#F5F3FF" font-size="28" font-family="Arial, sans-serif" font-weight="700">模型生成</text>
  <text x="480" y="272" text-anchor="middle" fill="#EDE9FE" font-size="18" font-family="Arial, sans-serif">优先补出“像答案”的内容</text>
  <text x="480" y="306" text-anchor="middle" fill="#EDE9FE" font-size="18" font-family="Arial, sans-serif">不一定主动承认不知道</text>
  <text x="480" y="340" text-anchor="middle" fill="#EDE9FE" font-size="18" font-family="Arial, sans-serif">可能把猜测说成事实</text>

  <rect x="654" y="154" width="220" height="110" rx="22" fill="#0F766E"/>
  <text x="764" y="204" text-anchor="middle" fill="#ECFDF5" font-size="26" font-family="Arial, sans-serif" font-weight="700">有证据支撑</text>
  <text x="764" y="238" text-anchor="middle" fill="#CCFBF1" font-size="17" font-family="Arial, sans-serif">引用可查、内容对得上</text>

  <rect x="654" y="294" width="220" height="128" rx="22" fill="#B91C1C"/>
  <text x="764" y="346" text-anchor="middle" fill="#FEF2F2" font-size="26" font-family="Arial, sans-serif" font-weight="700">幻觉输出</text>
  <text x="764" y="382" text-anchor="middle" fill="#FECACA" font-size="17" font-family="Arial, sans-serif">编造引用、细节、数字</text>
  <text x="764" y="408" text-anchor="middle" fill="#FECACA" font-size="17" font-family="Arial, sans-serif">语气越自信，越容易骗到人</text>

  <path d="M306 270H370" stroke="#94A3B8" stroke-width="10" stroke-linecap="round"/>
  <path d="M590 226H654" stroke="#5EEAD4" stroke-width="10" stroke-linecap="round"/>
  <path d="M590 342H654" stroke="#FCA5A5" stroke-width="10" stroke-linecap="round"/>

  <rect x="173" y="446" width="614" height="58" rx="18" fill="#111827" stroke="#334155"/>
  <text x="480" y="483" text-anchor="middle" fill="#E2E8F0" font-size="22" font-family="Arial, sans-serif">防幻觉的关键不是更会写，而是让答案更受证据约束、可核查、可复核</text>
</svg>
