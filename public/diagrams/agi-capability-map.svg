<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AGI capability map</title>
  <desc id="desc">A capability map contrasting narrow AI, AGI, and ASI by breadth and performance.</desc>
  <rect width="1200" height="720" fill="#f6f7f5"/>
  <line x1="160" y1="565" x2="1040" y2="565" stroke="#11140f" stroke-width="4"/>
  <line x1="160" y1="565" x2="160" y2="120" stroke="#11140f" stroke-width="4"/>
  <text x="600" y="632" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="28" font-weight="700" fill="#11140f">Task breadth</text>
  <text x="70" y="350" text-anchor="middle" transform="rotate(-90 70 350)" font-family="Geist, Arial, sans-serif" font-size="28" font-weight="700" fill="#11140f">Capability level</text>
  <rect x="230" y="420" width="210" height="110" fill="#ffffff" stroke="#315f4a" stroke-width="4"/>
  <text x="335" y="466" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="34" font-weight="700" fill="#11140f">ANI</text>
  <text x="335" y="505" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="20" fill="#596157">narrow tasks</text>
  <rect x="525" y="260" width="230" height="150" fill="#e8f4ee" stroke="#2f9e44" stroke-width="4"/>
  <text x="640" y="320" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="42" font-weight="700" fill="#11140f">AGI</text>
  <text x="640" y="360" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="20" fill="#596157">broad generality</text>
  <rect x="835" y="145" width="210" height="150" fill="#f7efe1" stroke="#be3a34" stroke-width="4"/>
  <text x="940" y="205" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="42" font-weight="700" fill="#11140f">ASI</text>
  <text x="940" y="246" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="20" fill="#596157">beyond human</text>
  <path d="M440 425 C510 360 535 345 525 335" fill="none" stroke="#11140f" stroke-opacity=".35" stroke-width="5"/>
  <path d="M755 278 C820 228 835 220 835 220" fill="none" stroke="#11140f" stroke-opacity=".35" stroke-width="5"/>
  <text x="600" y="85" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="30" font-weight="700" fill="#11140f">AGI is a proposed threshold, not a single agreed product label.</text>
</svg>
