<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">扩散模型逐步去噪示意图</title>
  <desc id="desc">从噪声到模糊轮廓再到清晰图像的三步流程，用于说明扩散模型的去噪生成过程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="32"/>
  <text x="600" y="86" fill="#f8fafc" font-size="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700">扩散模型：从噪声到图像</text>
  <text x="600" y="126" fill="#cbd5e1" font-size="22" text-anchor="middle" font-family="Inter, Arial, sans-serif">不是一次画完，而是逐步去噪、逐步显影</text>

  <g filter="url(#shadow)">
    <rect x="90" y="190" width="260" height="320" rx="28" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <rect x="470" y="190" width="260" height="320" rx="28" fill="#1e293b" stroke="#f59e0b" stroke-width="3"/>
    <rect x="850" y="190" width="260" height="320" rx="28" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="220" y="238" fill="#e0f2fe" font-size="28" font-weight="700">第 1 步：纯噪声</text>
    <text x="600" y="238" fill="#fef3c7" font-size="28" font-weight="700">第 2 步：出现轮廓</text>
    <text x="980" y="238" fill="#dcfce7" font-size="28" font-weight="700">第 3 步：清晰结果</text>
  </g>

  <g>
    <circle cx="220" cy="360" r="90" fill="#0f172a" stroke="#64748b" stroke-width="2"/>
    <g fill="#93c5fd" opacity="0.95">
      <circle cx="180" cy="320" r="10"/><circle cx="220" cy="300" r="7"/><circle cx="250" cy="332" r="12"/>
      <circle cx="280" cy="350" r="8"/><circle cx="196" cy="372" r="11"/><circle cx="234" cy="392" r="9"/>
      <circle cx="270" cy="398" r="10"/><circle cx="170" cy="410" r="8"/><circle cx="212" cy="435" r="7"/>
      <circle cx="252" cy="450" r="11"/><circle cx="287" cy="418" r="6"/><circle cx="160" cy="340" r="7"/>
    </g>

    <circle cx="600" cy="360" r="90" fill="#0f172a" stroke="#64748b" stroke-width="2"/>
    <path d="M544 406c26-56 64-95 116-114" fill="none" stroke="#fde68a" stroke-width="18" stroke-linecap="round" opacity="0.55"/>
    <path d="M550 400c22-40 50-68 92-84" fill="none" stroke="#fbbf24" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <circle cx="575" cy="340" r="9" fill="#fef3c7"/>
    <circle cx="626" cy="315" r="7" fill="#fef3c7"/>
    <circle cx="644" cy="380" r="8" fill="#fef3c7"/>

    <circle cx="980" cy="360" r="90" fill="#0f172a" stroke="#64748b" stroke-width="2"/>
    <path d="M928 410c34-75 86-117 124-127" fill="none" stroke="#86efac" stroke-width="22" stroke-linecap="round" opacity="0.35"/>
    <path d="M934 404c31-63 78-100 112-111" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round"/>
    <path d="M940 414c25 12 42 18 66 20" fill="none" stroke="#bbf7d0" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  </g>

  <g stroke="#475569" stroke-width="6" fill="none" stroke-linecap="round">
    <line x1="352" y1="350" x2="442" y2="350"/>
    <line x1="732" y1="350" x2="822" y2="350"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="442,350 420,336 420,364"/>
    <polygon points="822,350 800,336 800,364"/>
  </g>

  <text x="600" y="616" fill="#cbd5e1" font-size="22" text-anchor="middle" font-family="Inter, Arial, sans-serif">训练时学会如何逆转加噪过程；生成时则从随机噪声逐步采样回图像</text>
</svg>
