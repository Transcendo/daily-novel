<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">生成式 AI 主要输出模态示意图</title>
  <desc id="desc">中央为生成式 AI，周围连接文本、图像、音频、视频和代码五种常见输出形式。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="32"/>
  <text x="600" y="92" fill="#f8fafc" font-size="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700">生成式 AI 常见输出模态</text>
  <text x="600" y="130" fill="#cbd5e1" font-size="22" text-anchor="middle" font-family="Inter, Arial, sans-serif">它不是单一聊天能力，而是一组内容生成能力</text>

  <g fill="#111827" stroke="#60a5fa" stroke-width="3">
    <circle cx="600" cy="365" r="120" fill="#1d4ed8"/>
    <circle cx="600" cy="365" r="120" fill-opacity="0.88"/>
  </g>
  <text x="600" y="350" fill="#ffffff" font-size="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700">生成式 AI</text>
  <text x="600" y="390" fill="#dbeafe" font-size="22" text-anchor="middle" font-family="Inter, Arial, sans-serif">根据上下文产出新内容</text>

  <g stroke="#475569" stroke-width="4" fill="none">
    <line x1="600" y1="245" x2="600" y2="186"/>
    <line x1="706" y1="304" x2="846" y2="222"/>
    <line x1="706" y1="426" x2="846" y2="508"/>
    <line x1="494" y1="426" x2="354" y2="508"/>
    <line x1="494" y1="304" x2="354" y2="222"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g>
      <rect x="480" y="110" width="240" height="76" rx="20" fill="#1e293b" stroke="#f59e0b" stroke-width="3"/>
      <text x="600" y="154" fill="#fef3c7" font-size="28" font-weight="700">文本</text>
    </g>
    <g>
      <rect x="850" y="170" width="220" height="76" rx="20" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
      <text x="960" y="214" fill="#dcfce7" font-size="28" font-weight="700">图像</text>
    </g>
    <g>
      <rect x="850" y="474" width="220" height="76" rx="20" fill="#1e293b" stroke="#a78bfa" stroke-width="3"/>
      <text x="960" y="518" fill="#ede9fe" font-size="28" font-weight="700">视频</text>
    </g>
    <g>
      <rect x="130" y="474" width="220" height="76" rx="20" fill="#1e293b" stroke="#f43f5e" stroke-width="3"/>
      <text x="240" y="518" fill="#ffe4e6" font-size="28" font-weight="700">音频</text>
    </g>
    <g>
      <rect x="130" y="170" width="220" height="76" rx="20" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
      <text x="240" y="214" fill="#e0f2fe" font-size="28" font-weight="700">代码</text>
    </g>
  </g>
</svg>
