workflow:
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(.*-main|main)$/
    - if: $CI_COMMIT_BRANCH =~ /^(.*-test|test)$/

stages:
  - test
  - build
  - deploy

default:
  timeout: 15m
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  APPLICATION_PORT: "8461"
  CONTAINER_PORT: "80"
  DEPLOYER_PRO_IP: "ec-r-pro-project-1"
  DEPLOYER_TEST_IP: "ec-l-test-project-1"
  WORK_PROJECT_NAME: ""
  WORK_PROJECT_NAME_DIR: "${CI_PROJECT_DIR}"
  DOCKER_IMAGE_NAME: "${CI_REGISTRY_IMAGE}"
  DOCKER_IMAGE_VERSION: "${CI_COMMIT_BRANCH}-${CI_COMMIT_SHA}"
  DOCKERFILE_PATH: "${CI_PROJECT_DIR}/cicd/docker/Dockerfile"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_SITE_URL: "https://ai.eggcampus.com"
  PNPM_STORE_PATH: ".pnpm-store"
  NPM_REGISTRY_URL: "https://repo.huaweicloud.com/repository/npm/"
  PNPM_VERSION: "10.30.2"
  NACOS_ENABLED: "false"
  LOG_DIR: ""

test:
  stage: test
  tags:
    - build
  image: node:22-alpine
  cache:
    paths:
      - .pnpm-store/
    when: always
  before_script:
    - . cicd/script/common-variables.sh
    - . cicd/script/common-nodejs.sh
  script:
    - . cicd/script/test-nextjs-static-export.sh

build:
  stage: build
  tags:
    - build
  image: node:22-alpine
  cache:
    paths:
      - .pnpm-store/
    when: always
  before_script:
    - . cicd/script/common-variables.sh
    - . cicd/script/common-nodejs.sh
  script:
    - . cicd/script/build-nextjs-static-export.sh

.deploy_template:
  stage: deploy
  before_script:
    - . cicd/script/common-variables.sh
    - . cicd/script/deploy-docker-prepare.sh
  script:
    - . cicd/script/deploy-docker-runner.sh

deploy_pro:
  extends: .deploy_template
  tags:
    - ec-pro
  environment:
    name: production
    url: https://ai.eggcampus.com
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(.*-main|main)$/'

deploy_test:
  extends: .deploy_template
  tags:
    - ec-test
  environment:
    name: test
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(.*-test|test)$/'
